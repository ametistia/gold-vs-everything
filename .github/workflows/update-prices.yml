name: Update Gold Prices Daily

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install yfinance

      - name: Fetch prices from Yahoo Finance
        run: |
          python <<'EOF'
          import yfinance as yf
          import json
          from datetime import datetime, timezone
          
          # Yahoo Finance symbols
          symbols = {
              "gold": "GC=F",        # Gold futures
              "silver": "SI=F",       # Silver futures
              "oil": "CL=F",          # WTI Crude Oil futures
              "bitcoin": "BTC-USD",   # Bitcoin
              "sp500": "^GSPC"        # S&P 500 index
          }
          
          result = {
              "updatedAt": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }
          
          for key, symbol in symbols.items():
              ticker = yf.Ticker(symbol)
              hist = ticker.history(period="2d")
              
              if len(hist) > 0:
                  latest = hist.iloc[-1]
                  previous = hist.iloc[-2] if len(hist) > 1 else latest
                  
                  result[key] = {
                      "symbol": symbol,
                      "price": round(float(latest["Close"]), 2),
                      "previousClose": round(float(previous["Close"]), 2),
                      "change": round(float(latest["Close"] - previous["Close"]), 2),
                      "changePercent": round(float((latest["Close"] - previous["Close"]) / previous["Close"] * 100), 2),
                      "dayHigh": round(float(latest["High"]), 2),
                      "dayLow": round(float(latest["Low"]), 2),
                      "date": latest.name.strftime("%Y-%m-%d")
                  }
              else:
                  result[key] = {"error": "No data available"}
          
          with open("data/latest-prices.json", "w") as f:
              json.dump(result, f, indent=2)
          
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest-prices.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d')"
          git push
