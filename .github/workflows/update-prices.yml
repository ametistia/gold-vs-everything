name: Update Gold Prices Daily

on:
  schedule:
    # Runs every day at 21:30 UTC (after US market close)
    - cron: '30 21 * * *'
  workflow_dispatch:  # Lets you manually trigger it from GitHub UI

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch FMP prices and write JSON
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          # Fetch each asset from the new /stable/ endpoints
          GOLD=$(curl -s "https://financialmodelingprep.com/stable/quote?symbol=GCUSD&apikey=$FMP_API_KEY")
          SILVER=$(curl -s "https://financialmodelingprep.com/stable/quote?symbol=SIUSD&apikey=$FMP_API_KEY")
          OIL=$(curl -s "https://financialmodelingprep.com/stable/quote?symbol=CLUSD&apikey=$FMP_API_KEY")
          BTC=$(curl -s "https://financialmodelingprep.com/stable/quote?symbol=BTCUSD&apikey=$FMP_API_KEY")
          SP500=$(curl -s "https://financialmodelingprep.com/stable/quote?symbol=%5EGSPC&apikey=$FMP_API_KEY")
          
          # Build the JSON file
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > data/latest-prices.json <<EOF
          {
            "updatedAt": "$TIMESTAMP",
            "gold": $GOLD,
            "silver": $SILVER,
            "oil": $OIL,
            "bitcoin": $BTC,
            "sp500": $SP500
          }
          EOF
          
          # Show what we saved (for debugging in the Actions log)
          cat data/latest-prices.json

      - name: Commit and push updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest-prices.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d')"
          git push
